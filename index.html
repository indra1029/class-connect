<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes" />
    
    <!-- Primary Meta Tags -->
    <title>Class Connect | Real-Time Classroom Collaboration Platform</title>
    <meta name="title" content="Class Connect | Real-Time Classroom Collaboration Platform" />
    <meta name="description" content="Class Connect is a real-time classroom collaboration platform where students can chat, join video calls, share files, and stay connected with their class." />
    <meta name="keywords" content="Class Connect, classroom communication, student collaboration platform, WebRTC classroom app, student video call app, class chat system" />
    <meta name="author" content="Indra Kumar" />
    <meta name="robots" content="index, follow" />
    
    <!-- Canonical -->
    <link rel="canonical" href="https://cohortchat-hub.lovable.app/" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://cohortchat-hub.lovable.app/" />
    <meta property="og:title" content="Class Connect - Real-Time Classroom Collaboration Platform" />
    <meta property="og:description" content="Chat, video call, share files, and collaborate with your class in real-time." />
    <meta property="og:image" content="https://cohortchat-hub.lovable.app/classchat-logo.png" />
    
    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Class Connect - Real-Time Classroom Collaboration Platform" />
    <meta name="twitter:description" content="Real-time class collaboration platform with chat, video calls, and file sharing." />
    <meta name="twitter:image" content="https://cohortchat-hub.lovable.app/classchat-logo.png" />
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#0EA5E9" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Class Connect" />
    
    <!-- Manifest -->
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/classchat-logo.png" />
    <link rel="apple-touch-icon" href="/classchat-logo.png" />

    <!-- Performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Class Connect",
      "description": "Real-time classroom collaboration platform with chat, video calls, and file sharing.",
      "url": "https://cohortchat-hub.lovable.app/",
      "applicationCategory": "EducationalApplication",
      "operatingSystem": "Web",
      "author": {
        "@type": "Person",
        "name": "Indra Kumar"
      },
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      }
    }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
